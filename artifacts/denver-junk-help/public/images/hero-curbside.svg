<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="hero-curbside-title" preserveAspectRatio="xMidYMid meet">
  <title id="hero-curbside-title">Editorial illustration: a tidy stack of household items — couch, dresser, lamp, boxes, rolled rug — neatly arranged for pickup on a Denver-area residential street, with subtle Rocky Mountain silhouettes in the distance.</title>

  <!-- Warm cream background -->
  <rect width="1600" height="900" fill="hsl(40, 30%, 97%)"/>

  <!-- Soft golden-hour sun (low opacity) -->
  <circle cx="1280" cy="220" r="120" fill="hsl(25, 50%, 60%)" opacity="0.10"/>
  <circle cx="1280" cy="220" r="80" fill="hsl(25, 55%, 62%)" opacity="0.14"/>
  <circle cx="1280" cy="220" r="48" fill="hsl(25, 55%, 64%)" opacity="0.18"/>

  <!-- Distant back-range mountain silhouette (very low opacity) -->
  <path d="M 0 460 L 130 340 L 280 430 L 420 320 L 580 410 L 740 360 L 900 410 L 1060 330 L 1220 410 L 1380 360 L 1540 420 L 1600 400 L 1600 720 L 0 720 Z"
        fill="hsl(152, 30%, 28%)" opacity="0.10"/>

  <!-- Front-range mountain silhouette -->
  <path d="M 0 520 L 160 420 L 340 510 L 520 400 L 700 510 L 880 440 L 1060 510 L 1240 420 L 1400 500 L 1600 460 L 1600 720 L 0 720 Z"
        fill="hsl(152, 35%, 28%)" opacity="0.16"/>

  <!-- Subtle pine tree silhouette cluster -->
  <g fill="hsl(152, 40%, 28%)" opacity="0.20">
    <path d="M 100 600 L 120 540 L 140 600 Z"/>
    <path d="M 145 605 L 168 550 L 190 605 Z"/>
    <path d="M 1480 600 L 1500 545 L 1520 600 Z"/>
    <path d="M 1525 605 L 1548 555 L 1568 605 Z"/>
  </g>

  <!-- Ground / sidewalk line -->
  <line x1="0" y1="725" x2="1600" y2="725" stroke="hsl(210, 12%, 25%)" stroke-width="2.5"/>
  <line x1="0" y1="730" x2="1600" y2="730" stroke="hsl(210, 12%, 25%)" stroke-width="1" opacity="0.3"/>

  <!-- ============ FOREGROUND ITEMS ============ -->

  <!-- Rolled rug (leaning, leftmost) -->
  <g transform="translate(280, 530)" stroke="hsl(25, 50%, 50%)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 0 195 L 60 0" />
    <path d="M 24 195 L 84 0" />
    <ellipse cx="72" cy="0" rx="14" ry="6" fill="hsl(25, 50%, 60%)" fill-opacity="0.20"/>
    <ellipse cx="12" cy="195" rx="14" ry="6" fill="hsl(25, 50%, 60%)" fill-opacity="0.20"/>
  </g>

  <!-- Couch -->
  <g transform="translate(390, 555)" stroke="hsl(152, 40%, 28%)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Back -->
    <path d="M 0 170 L 0 60 Q 0 30 30 30 L 350 30 Q 380 30 380 60 L 380 170"/>
    <!-- Arms -->
    <path d="M 20 170 L 20 70 Q 20 55 35 55 L 60 55"/>
    <path d="M 360 170 L 360 70 Q 360 55 345 55 L 320 55"/>
    <!-- Seat cushions -->
    <path d="M 70 170 L 70 95 Q 70 85 85 85 L 175 85 Q 190 85 190 95 L 190 170"/>
    <path d="M 190 170 L 190 95 Q 190 85 205 85 L 295 85 Q 310 85 310 95 L 310 170"/>
    <!-- Feet -->
    <line x1="10" y1="170" x2="10" y2="185"/>
    <line x1="370" y1="170" x2="370" y2="185"/>
    <!-- Subtle cushion shading -->
    <rect x="75" y="100" width="110" height="55" fill="hsl(152, 40%, 28%)" fill-opacity="0.06" rx="6"/>
    <rect x="195" y="100" width="110" height="55" fill="hsl(152, 40%, 28%)" fill-opacity="0.06" rx="6"/>
  </g>

  <!-- Dresser -->
  <g transform="translate(830, 555)" stroke="hsl(210, 12%, 25%)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="0" y="0" width="170" height="170"/>
    <line x1="0" y1="56" x2="170" y2="56"/>
    <line x1="0" y1="112" x2="170" y2="112"/>
    <!-- Drawer pulls -->
    <circle cx="42" cy="28" r="3.5" fill="hsl(210, 12%, 25%)"/>
    <circle cx="128" cy="28" r="3.5" fill="hsl(210, 12%, 25%)"/>
    <circle cx="42" cy="84" r="3.5" fill="hsl(210, 12%, 25%)"/>
    <circle cx="128" cy="84" r="3.5" fill="hsl(210, 12%, 25%)"/>
    <circle cx="42" cy="140" r="3.5" fill="hsl(210, 12%, 25%)"/>
    <circle cx="128" cy="140" r="3.5" fill="hsl(210, 12%, 25%)"/>
    <!-- Subtle wood-tone wash -->
    <rect x="3" y="3" width="164" height="164" fill="hsl(25, 35%, 50%)" fill-opacity="0.08"/>
  </g>

  <!-- Stacked cardboard boxes -->
  <g stroke="hsl(25, 45%, 45%)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Bottom box -->
    <rect x="1060" y="615" width="130" height="110" fill="hsl(25, 50%, 65%)" fill-opacity="0.18"/>
    <line x1="1060" y1="640" x2="1190" y2="640" stroke-dasharray="6 8" opacity="0.55"/>
    <!-- Top box (smaller, tilted slightly) -->
    <rect x="1075" y="555" width="100" height="60" fill="hsl(25, 50%, 65%)" fill-opacity="0.20"/>
    <line x1="1075" y1="572" x2="1175" y2="572" stroke-dasharray="5 7" opacity="0.55"/>
  </g>

  <!-- Floor lamp -->
  <g transform="translate(1240, 510)" stroke="hsl(210, 12%, 25%)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Shade -->
    <path d="M 0 60 L 26 0 L 64 0 L 90 60 Z" fill="hsl(25, 50%, 60%)" fill-opacity="0.15"/>
    <line x1="0" y1="60" x2="90" y2="60"/>
    <!-- Pole -->
    <line x1="45" y1="60" x2="45" y2="205"/>
    <!-- Base -->
    <ellipse cx="45" cy="212" rx="32" ry="8" fill="hsl(210, 12%, 25%)" fill-opacity="0.20"/>
    <line x1="13" y1="212" x2="77" y2="212"/>
  </g>

  <!-- Tiny "for pickup" handwritten tag detail (no text — just the tag shape) -->
  <g transform="translate(800, 540) rotate(-8)" fill="hsl(40, 25%, 95%)" stroke="hsl(25, 45%, 50%)" stroke-width="2" stroke-linejoin="round">
    <path d="M 0 0 L 50 0 L 60 12 L 50 24 L 0 24 Z"/>
    <circle cx="6" cy="12" r="2" fill="hsl(25, 45%, 50%)"/>
    <line x1="14" y1="9" x2="46" y2="9" stroke="hsl(25, 45%, 50%)" stroke-width="1.5" opacity="0.4"/>
    <line x1="14" y1="15" x2="46" y2="15" stroke="hsl(25, 45%, 50%)" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- Tiny bird silhouette in distance -->
  <g fill="hsl(210, 12%, 25%)" opacity="0.4">
    <path d="M 760 280 q 8 -6 16 0 q 8 -6 16 0" stroke="hsl(210, 12%, 25%)" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 940 340 q 6 -4 12 0 q 6 -4 12 0" stroke="hsl(210, 12%, 25%)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>
</svg>
