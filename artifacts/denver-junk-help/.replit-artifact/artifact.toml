kind = "web"
previewPath = "/"
title = "Denver Junk Help"
version = "1.0.0"
id = "artifacts/denver-junk-help"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24584

[services.development]
run = "pnpm --filter @workspace/denver-junk-help run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/denver-junk-help", "run", "build" ]
publicDir = "artifacts/denver-junk-help/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24584"
BASE_PATH = "/"
